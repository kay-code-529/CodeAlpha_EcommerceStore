<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cart</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav>
    <h1>My Store</h1>
    <div><a href="index.html">Home</a></div>
  </nav>

  <main style="padding:32px; max-width:600px; margin:0 auto">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>

    <p id="order-msg" style="color:green; margin-top:12px"></p>

  <script src="js/cart.js"></script>
</body>
</html>
