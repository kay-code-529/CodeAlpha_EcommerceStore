<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — My Store</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav>
    <h1>My Store</h1>
    <div>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <main>
    <div class="auth-container">
      <h2>Create Account 🚀</h2>
      <p>Join us today and start shopping</p>
      <input id="email"    type="email"    placeholder="Email address"/>
      <input id="password" type="password" placeholder="Password (min 6 characters)"/>
      <button onclick="register()" style="margin-top:20px">Create Account</button>
      <p style="text-align:center; margin-top:16px; color:#64748b; font-size:14px">
        Already have an account? <a href="login.html">Login</a>
      </p>
      <p id="msg" style="margin-top:12px"></p>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
